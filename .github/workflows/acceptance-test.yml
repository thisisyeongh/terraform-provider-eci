name: Acceptance Test

on:
  pull_request:
    types: [labeled, synchronize]

permissions:
  contents: read

jobs:
  acceptance_test:
    if: contains(github.event.pull_request.labels.*.name, 'run-acceptance-tests')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Deep dive Go net/http diagnostics
        run: |
          cat > /tmp/netdiag.go << 'GOEOF'
          package main

          import (
          	"context"
          	"crypto/tls"
          	"fmt"
          	"net"
          	"net/http"
          	"net/http/httptrace"
          	"os/exec"
          	"strings"
          	"time"
          )

          func main() {
          	host := "portal.elice.cloud"
          	url := "https://" + host + "/api/user/organization"

          	// === 1. DNS: check IPv4 and IPv6 ===
          	fmt.Println("=== 1. DNS records ===")
          	resolver := &net.Resolver{}
          	ctx := context.Background()

          	ips, err := resolver.LookupIPAddr(ctx, host)
          	if err != nil {
          		fmt.Printf("DNS lookup failed: %s\n", err)
          	} else {
          		for _, ip := range ips {
          			if ip.IP.To4() != nil {
          				fmt.Printf("  A (IPv4):    %s\n", ip.IP)
          			} else {
          				fmt.Printf("  AAAA (IPv6): %s\n", ip.IP)
          			}
          		}
          	}

          	// Also check with dig
          	fmt.Println("\n  dig A:")
          	out, _ := exec.Command("dig", "+short", "A", host).Output()
          	fmt.Printf("    %s", string(out))
          	fmt.Println("  dig AAAA:")
          	out, _ = exec.Command("dig", "+short", "AAAA", host).Output()
          	if len(strings.TrimSpace(string(out))) == 0 {
          		fmt.Println("    (none)")
          	} else {
          		fmt.Printf("    %s", string(out))
          	}

          	// === 2. System info ===
          	fmt.Println("\n=== 2. System info ===")
          	out, _ = exec.Command("cat", "/etc/resolv.conf").Output()
          	fmt.Printf("  resolv.conf:\n%s", string(out))
          	out, _ = exec.Command("sysctl", "net.ipv6.conf.all.disable_ipv6").Output()
          	fmt.Printf("  %s", string(out))
          	out, _ = exec.Command("ip", "addr", "show").Output()
          	// Just show if there's an IPv6 address
          	for _, line := range strings.Split(string(out), "\n") {
          		if strings.Contains(line, "inet6") {
          			fmt.Printf("  %s\n", strings.TrimSpace(line))
          		}
          	}

          	// === 3. First request with detailed tracing ===
          	fmt.Println("\n=== 3. First request with httptrace ===")
          	doTracedRequest(url, "first")

          	// === 4. Second request with tracing (should succeed) ===
          	fmt.Println("\n=== 4. Second request with httptrace ===")
          	doTracedRequest(url, "second")

          	// === 5. Force IPv4 only - 10 requests ===
          	fmt.Println("\n=== 5. Force IPv4 only (10 requests) ===")
          	failed := 0
          	for i := 1; i <= 10; i++ {
          		client := &http.Client{
          			Transport: &http.Transport{
          				DisableKeepAlives: true,
          				DialContext: func(ctx context.Context, network, addr string) (net.Conn, error) {
          					// Force IPv4
          					d := &net.Dialer{Timeout: 15 * time.Second}
          					return d.DialContext(ctx, "tcp4", addr)
          				},
          			},
          			Timeout: 15 * time.Second,
          		}
          		start := time.Now()
          		resp, err := client.Get(url)
          		elapsed := time.Since(start)
          		client.CloseIdleConnections()
          		if err != nil {
          			failed++
          			fmt.Printf("  ipv4_%02d: FAILED (%s) %s\n", i, elapsed, err)
          			curlCheck(url)
          		} else {
          			fmt.Printf("  ipv4_%02d: status=%d time=%s\n", i, resp.StatusCode, elapsed)
          			resp.Body.Close()
          		}
          	}
          	fmt.Printf("  IPv4 only result: %d/10 failed\n", failed)

          	// === 6. Force IPv6 only (if available) ===
          	fmt.Println("\n=== 6. Force IPv6 only (10 requests) ===")
          	failed6 := 0
          	for i := 1; i <= 3; i++ {
          		client := &http.Client{
          			Transport: &http.Transport{
          				DisableKeepAlives: true,
          				DialContext: func(ctx context.Context, network, addr string) (net.Conn, error) {
          					d := &net.Dialer{Timeout: 5 * time.Second}
          					return d.DialContext(ctx, "tcp6", addr)
          				},
          			},
          			Timeout: 6 * time.Second,
          		}
          		start := time.Now()
          		resp, err := client.Get(url)
          		elapsed := time.Since(start)
          		client.CloseIdleConnections()
          		if err != nil {
          			failed6++
          			fmt.Printf("  ipv6_%02d: FAILED (%s) %s\n", i, elapsed, err)
          		} else {
          			fmt.Printf("  ipv6_%02d: status=%d time=%s\n", i, resp.StatusCode, elapsed)
          			resp.Body.Close()
          		}
          	}
          	fmt.Printf("  IPv6 only result: %d/3 failed\n", failed6)

          	// === 7. Warm-up then test ===
          	fmt.Println("\n=== 7. Warm-up (dummy request) then 10 requests ===")
          	warmClient := &http.Client{Timeout: 30 * time.Second}
          	warmResp, warmErr := warmClient.Get(url)
          	if warmErr != nil {
          		fmt.Printf("  warm-up: FAILED %s\n", warmErr)
          	} else {
          		fmt.Printf("  warm-up: status=%d\n", warmResp.StatusCode)
          		warmResp.Body.Close()
          	}
          	warmClient.CloseIdleConnections()
          	time.Sleep(1 * time.Second)

          	failedW := 0
          	for i := 1; i <= 10; i++ {
          		client := &http.Client{
          			Transport: &http.Transport{DisableKeepAlives: true},
          			Timeout:   15 * time.Second,
          		}
          		start := time.Now()
          		resp, err := client.Get(url)
          		elapsed := time.Since(start)
          		client.CloseIdleConnections()
          		if err != nil {
          			failedW++
          			fmt.Printf("  warm_%02d: FAILED (%s) %s\n", i, elapsed, err)
          		} else {
          			fmt.Printf("  warm_%02d: status=%d time=%s\n", i, resp.StatusCode, elapsed)
          			resp.Body.Close()
          		}
          	}
          	fmt.Printf("  After warm-up result: %d/10 failed\n", failedW)

          	// === 8. Default Go 30 requests (control) ===
          	fmt.Println("\n=== 8. Default Go net/http 30 requests (control) ===")
          	failedC := 0
          	for i := 1; i <= 30; i++ {
          		client := &http.Client{
          			Transport: &http.Transport{DisableKeepAlives: true},
          			Timeout:   15 * time.Second,
          		}
          		start := time.Now()
          		resp, err := client.Get(url)
          		elapsed := time.Since(start)
          		client.CloseIdleConnections()
          		if err != nil {
          			failedC++
          			fmt.Printf("  ctrl_%02d: FAILED (%s) %s\n", i, elapsed, err)
          			curlCheck(url)
          		} else {
          			fmt.Printf("  ctrl_%02d: status=%d time=%s\n", i, resp.StatusCode, elapsed)
          			resp.Body.Close()
          		}
          	}
          	fmt.Printf("  Control result: %d/30 failed\n", failedC)
          }

          func doTracedRequest(url, label string) {
          	var dnsStart, connStart, tlsStart time.Time
          	var remoteAddr string

          	trace := &httptrace.ClientTrace{
          		DNSStart: func(info httptrace.DNSStartInfo) {
          			dnsStart = time.Now()
          			fmt.Printf("  [%s] DNS start: host=%s\n", label, info.Host)
          		},
          		DNSDone: func(info httptrace.DNSDoneInfo) {
          			fmt.Printf("  [%s] DNS done (%s): addrs=%v err=%v\n", label, time.Since(dnsStart), info.Addrs, info.Err)
          		},
          		ConnectStart: func(network, addr string) {
          			connStart = time.Now()
          			fmt.Printf("  [%s] TCP connect start: network=%s addr=%s\n", label, network, addr)
          		},
          		ConnectDone: func(network, addr string, err error) {
          			fmt.Printf("  [%s] TCP connect done (%s): addr=%s err=%v\n", label, time.Since(connStart), addr, err)
          		},
          		TLSHandshakeStart: func() {
          			tlsStart = time.Now()
          			fmt.Printf("  [%s] TLS handshake start\n", label)
          		},
          		TLSHandshakeDone: func(state tls.ConnectionState, err error) {
          			fmt.Printf("  [%s] TLS handshake done (%s): version=%d err=%v\n", label, time.Since(tlsStart), state.Version, err)
          		},
          		GotConn: func(info httptrace.GotConnInfo) {
          			remoteAddr = info.Conn.RemoteAddr().String()
          			fmt.Printf("  [%s] Got conn: reused=%v remote=%s\n", label, info.Reused, remoteAddr)
          		},
          	}

          	req, _ := http.NewRequestWithContext(httptrace.WithClientTrace(context.Background(), trace), "GET", url, nil)
          	client := &http.Client{
          		Transport: &http.Transport{DisableKeepAlives: true},
          		Timeout:   30 * time.Second,
          	}
          	start := time.Now()
          	resp, err := client.Do(req)
          	elapsed := time.Since(start)
          	client.CloseIdleConnections()

          	if err != nil {
          		fmt.Printf("  [%s] RESULT: FAILED (%s) %s\n", label, elapsed, err)
          		curlCheck(url)
          	} else {
          		fmt.Printf("  [%s] RESULT: status=%d time=%s\n", label, resp.StatusCode, elapsed)
          		resp.Body.Close()
          	}
          }

          func curlCheck(url string) {
          	curlStart := time.Now()
          	out, curlErr := exec.Command("curl", "-sS", "-o", "/dev/null",
          		"--no-keepalive", "--max-time", "10",
          		"-w", "http_code=%{http_code} time=%{time_total}s tcp=%{time_connect}s tls=%{time_appconnect}s",
          		url).CombinedOutput()
          	curlElapsed := time.Since(curlStart)
          	if curlErr != nil {
          		fmt.Printf("      CURL ALSO FAILED (%s): %s %s\n", curlElapsed, string(out), curlErr)
          	} else {
          		fmt.Printf("      CURL OK (%s): %s\n", curlElapsed, strings.TrimSpace(string(out)))
          	}
          }
          GOEOF
          go run /tmp/netdiag.go
      # Acceptance tests temporarily disabled while investigating network issues
      # - name: Run acceptance tests
      #   run: make testacc
      #   env:
      #     TF_ACC: "1"
      #     ECI_API_ACCESS_TOKEN: ${{ secrets.ECI_API_ACCESS_TOKEN }}
      #     ECI_API_ENDPOINT: "https://portal.elice.cloud/api/"
      #     ECI_ZONE_ID: "cb67250d-0050-44fa-9872-c8dd7fb9e614"
      #     ECI_TEST_REGION_NAME: "central-01"
      #     ECI_TEST_ZONE_NAME: "central-01-a"
      #     ECI_TEST_INSTANCE_TYPE_NAME: "C-2"
      #     ECI_TEST_IMAGE_NAME: "Ubuntu 22.04 LTS (20250116)"
      #     ECI_TEST_PRICING_NAME: "C-2"
      #     ECI_TEST_PRICING_TYPE: "ondemand"
      #     ECI_TEST_VM_PRICING_NAME: "C-2"
      #     ECI_TEST_VM_PRICING_TYPE: "ondemand"
      #     ECI_TEST_BS_PRICING_NAME: "Block Storage"
      #     ECI_TEST_BS_PRICING_TYPE: "ondemand"
      #     ECI_TEST_PIP_PRICING_NAME: "Public IP"
      #     ECI_TEST_PIP_PRICING_TYPE: "ondemand"
