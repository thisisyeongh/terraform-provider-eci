name: Acceptance Test

on:
  pull_request:
    types: [labeled, synchronize]

permissions:
  contents: read

jobs:
  acceptance_test:
    if: contains(github.event.pull_request.labels.*.name, 'run-acceptance-tests')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Network diagnostics (Go vs curl on failure)
        run: |
          cat > /tmp/netdiag.go << 'GOEOF'
          package main

          import (
          	"fmt"
          	"net/http"
          	"os/exec"
          	"strings"
          	"time"
          )

          func main() {
          	url := "https://portal.elice.cloud/api/user/organization"
          	n := 50

          	fmt.Printf("=== Go net/http: %d requests (new connection each) ===\n", n)
          	fmt.Println("On failure, immediately run curl to check if network is reachable\n")

          	failed := 0
          	for i := 1; i <= n; i++ {
          		client := &http.Client{
          			Transport: &http.Transport{DisableKeepAlives: true},
          			Timeout:   15 * time.Second,
          		}
          		start := time.Now()
          		resp, err := client.Get(url)
          		elapsed := time.Since(start)
          		client.CloseIdleConnections()

          		if err != nil {
          			failed++
          			fmt.Printf("  %02d: GO FAILED (%s) %s\n", i, elapsed, err)

          			// Immediately try curl to see if network works right now
          			curlStart := time.Now()
          			out, curlErr := exec.Command("curl", "-sS", "-o", "/dev/null",
          				"--no-keepalive", "--max-time", "10",
          				"-w", "http_code=%{http_code} time=%{time_total}s tcp=%{time_connect}s tls=%{time_appconnect}s",
          				url).CombinedOutput()
          			curlElapsed := time.Since(curlStart)

          			if curlErr != nil {
          				fmt.Printf("      CURL ALSO FAILED (%s): %s %s\n", curlElapsed, string(out), curlErr)
          			} else {
          				fmt.Printf("      CURL OK (%s): %s\n", curlElapsed, strings.TrimSpace(string(out)))
          			}
          		} else {
          			fmt.Printf("  %02d: status=%d time=%s\n", i, resp.StatusCode, elapsed)
          			resp.Body.Close()
          		}
          	}
          	fmt.Printf("\nResult: %d/%d failed\n", failed, n)
          }
          GOEOF
          go run /tmp/netdiag.go
