name: Acceptance Test

on:
  pull_request:
    types: [labeled, synchronize]

permissions:
  contents: read

jobs:
  acceptance_test:
    if: contains(github.event.pull_request.labels.*.name, 'run-acceptance-tests')
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Go vs curl interleaved comparison (200 pairs)
        run: |
          cat > /tmp/netdiag.go << 'GOEOF'
          package main

          import (
          	"context"
          	"crypto/tls"
          	"fmt"
          	"net"
          	"net/http"
          	"net/http/httptrace"
          	"os/exec"
          	"strings"
          	"time"
          )

          func doCurl(url string, i int) {
          	start := time.Now()
          	out, err := exec.Command("curl", "-sS", "-o", "/dev/null",
          		"--no-keepalive", "--max-time", "120",
          		"-w", "http_code=%{http_code} total=%{time_total}s dns=%{time_namelookup}s tcp=%{time_connect}s tls=%{time_appconnect}s ttfb=%{time_starttransfer}s",
          		url).CombinedOutput()
          	elapsed := time.Since(start)
          	result := strings.TrimSpace(string(out))
          	if err != nil {
          		fmt.Printf("  %03d CURL:  FAILED (%s) %s %s\n", i, elapsed, result, err)
          	} else {
          		fmt.Printf("  %03d CURL:  %s\n", i, result)
          	}
          }

          func doGo(url string, i int) {
          	var dnsStart, dnsEnd, connStart, connEnd, tlsStart, tlsEnd time.Time
          	var connNetwork, connAddr string

          	trace := &httptrace.ClientTrace{
          		DNSStart:     func(info httptrace.DNSStartInfo) { dnsStart = time.Now() },
          		DNSDone:      func(info httptrace.DNSDoneInfo) { dnsEnd = time.Now() },
          		ConnectStart: func(network, addr string) { connStart = time.Now(); connNetwork = network; connAddr = addr },
          		ConnectDone:  func(network, addr string, err error) { connEnd = time.Now() },
          		TLSHandshakeStart: func() { tlsStart = time.Now() },
          		TLSHandshakeDone:  func(state tls.ConnectionState, err error) { tlsEnd = time.Now() },
          	}

          	transport := &http.Transport{
          		DisableKeepAlives: true,
          		DialContext: (&net.Dialer{
          			Timeout: 120 * time.Second,
          		}).DialContext,
          		TLSHandshakeTimeout: 120 * time.Second,
          	}

          	client := &http.Client{
          		Transport: transport,
          		Timeout:   120 * time.Second,
          	}

          	req, _ := http.NewRequestWithContext(
          		httptrace.WithClientTrace(context.Background(), trace),
          		"GET", url, nil,
          	)

          	start := time.Now()
          	resp, err := client.Do(req)
          	elapsed := time.Since(start)
          	client.CloseIdleConnections()

          	dnsDur := dnsEnd.Sub(dnsStart)
          	connDur := connEnd.Sub(connStart)
          	tlsDur := tlsEnd.Sub(tlsStart)

          	if err != nil {
          		fmt.Printf("  %03d GO:    FAILED total=%s dns=%s tcp=%s(%s→%s) tls=%s err=%s\n",
          			i, elapsed, dnsDur, connDur, connNetwork, connAddr, tlsDur, err)
          	} else {
          		fmt.Printf("  %03d GO:    http=%d total=%s dns=%s tcp=%s(%s→%s) tls=%s\n",
          			i, resp.StatusCode, elapsed, dnsDur, connDur, connNetwork, connAddr, tlsDur)
          		resp.Body.Close()
          	}
          }

          func main() {
          	url := "https://portal.elice.cloud/api/user/organization"
          	n := 200

          	fmt.Printf("=== Go vs curl interleaved: %d pairs ===\n", n)
          	fmt.Println("Each pair: Go request → curl request (same moment)")
          	fmt.Println("Go timeout: 120s, curl timeout: 120s")
          	fmt.Println("")

          	goFailed := 0
          	curlFailed := 0
          	goSlow := 0
          	curlSlow := 0

          	for i := 1; i <= n; i++ {
          		// Go first
          		goStart := time.Now()

          		var dnsStart, dnsEnd, connStart, connEnd, tlsStart, tlsEnd time.Time
          		var connNetwork, connAddr string
          		var tlsVersion uint16

          		trace := &httptrace.ClientTrace{
          			DNSStart:     func(info httptrace.DNSStartInfo) { dnsStart = time.Now() },
          			DNSDone:      func(info httptrace.DNSDoneInfo) { dnsEnd = time.Now() },
          			ConnectStart: func(network, addr string) { connStart = time.Now(); connNetwork = network; connAddr = addr },
          			ConnectDone:  func(network, addr string, err error) { connEnd = time.Now() },
          			TLSHandshakeStart: func() { tlsStart = time.Now() },
          			TLSHandshakeDone:  func(state tls.ConnectionState, err error) { tlsEnd = time.Now(); tlsVersion = state.Version },
          		}

          		transport := &http.Transport{
          			DisableKeepAlives: true,
          			DialContext: (&net.Dialer{
          				Timeout: 120 * time.Second,
          			}).DialContext,
          			TLSHandshakeTimeout: 120 * time.Second,
          		}
          		client := &http.Client{Transport: transport, Timeout: 120 * time.Second}
          		req, _ := http.NewRequestWithContext(
          			httptrace.WithClientTrace(context.Background(), trace),
          			"GET", url, nil,
          		)
          		resp, err := client.Do(req)
          		goElapsed := time.Since(goStart)
          		client.CloseIdleConnections()

          		dnsDur := dnsEnd.Sub(dnsStart)
          		connDur := connEnd.Sub(connStart)
          		tlsDur := tlsEnd.Sub(tlsStart)

          		slow := ""
          		if goElapsed > 2*time.Second {
          			slow = " [SLOW]"
          			goSlow++
          		}

          		if err != nil {
          			goFailed++
          			fmt.Printf("  %03d GO:  %s FAILED total=%s dns=%s tcp=%s(%s→%s) tls=%s err=%s\n",
          				i, slow, goElapsed, dnsDur, connDur, connNetwork, connAddr, tlsDur, err)
          		} else {
          			fmt.Printf("  %03d GO:  %s http=%d total=%s dns=%s tcp=%s(%s→%s) tls=%s tlsver=%d\n",
          				i, slow, resp.StatusCode, goElapsed, dnsDur, connDur, connNetwork, connAddr, tlsDur, tlsVersion)
          			resp.Body.Close()
          		}

          		// curl immediately after
          		curlStart := time.Now()
          		out, curlErr := exec.Command("curl", "-sS", "-o", "/dev/null",
          			"--no-keepalive", "--max-time", "120",
          			"-w", "http=%{http_code} total=%{time_total}s dns=%{time_namelookup}s tcp=%{time_connect}s tls=%{time_appconnect}s",
          			url).CombinedOutput()
          		curlElapsed := time.Since(curlStart)
          		curlResult := strings.TrimSpace(string(out))

          		curlSlow := ""
          		if curlElapsed > 2*time.Second {
          			curlSlow = " [SLOW]"
          		}

          		if curlErr != nil {
          			curlFailed++
          			fmt.Printf("  %03d CURL:%s FAILED (%s) %s %s\n", i, curlSlow, curlElapsed, curlResult, curlErr)
          		} else {
          			fmt.Printf("  %03d CURL:%s %s\n", i, curlSlow, curlResult)
          		}

          		// 0.5s pause between pairs
          		time.Sleep(500 * time.Millisecond)
          	}

          	fmt.Println("")
          	fmt.Println("=== Summary ===")
          	fmt.Printf("Go:   %d/%d failed, %d slow (>2s)\n", goFailed, n, goSlow)
          	fmt.Printf("curl: %d/%d failed, %d slow (>2s)\n", curlFailed, n, curlSlow)
          }
          GOEOF
          go run /tmp/netdiag.go
