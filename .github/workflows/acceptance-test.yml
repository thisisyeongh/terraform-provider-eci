name: Acceptance Test

on:
  pull_request:
    types: [labeled, synchronize]

permissions:
  contents: read

jobs:
  acceptance_test:
    if: contains(github.event.pull_request.labels.*.name, 'run-acceptance-tests')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Network diagnostics (Go level)
        run: |
          cat > /tmp/netdiag.go << 'GOEOF'
          package main

          import (
          	"crypto/tls"
          	"fmt"
          	"net"
          	"net/http"
          	"os"
          	"sync"
          	"sync/atomic"
          	"time"
          )

          func newClient() *http.Client {
          	return &http.Client{
          		Transport: &http.Transport{
          			DisableKeepAlives: true,
          			DialContext: (&net.Dialer{
          				Timeout: 30 * time.Second,
          			}).DialContext,
          			TLSHandshakeTimeout: 30 * time.Second,
          			TLSClientConfig:     &tls.Config{},
          		},
          		Timeout: 60 * time.Second,
          	}
          }

          func doRequest(endpoint, token string) (int, time.Duration, error) {
          	client := newClient()
          	start := time.Now()
          	req, _ := http.NewRequest("GET", endpoint+"user/organization", nil)
          	req.Header.Set("Authorization", "Bearer "+token)
          	resp, err := client.Do(req)
          	elapsed := time.Since(start)
          	if err != nil {
          		return 0, elapsed, err
          	}
          	resp.Body.Close()
          	return resp.StatusCode, elapsed, nil
          }

          func main() {
          	endpoint := os.Getenv("ECI_API_ENDPOINT")
          	token := os.Getenv("ECI_API_ACCESS_TOKEN")

          	fmt.Println("=== Sequential: 50 requests, each with NEW connection ===")
          	var seqFail int
          	for i := 1; i <= 50; i++ {
          		status, elapsed, err := doRequest(endpoint, token)
          		if err != nil {
          			seqFail++
          			fmt.Printf("seq%02d: FAILED (%s) err=%s\n", i, elapsed, err)
          		} else {
          			fmt.Printf("seq%02d: status=%d time=%s\n", i, status, elapsed)
          		}
          	}
          	fmt.Printf("Sequential result: %d/50 failed\n\n", seqFail)

          	fmt.Println("=== Concurrent: 20 requests, each with NEW connection ===")
          	var concFail atomic.Int32
          	var wg sync.WaitGroup
          	for i := 1; i <= 20; i++ {
          		wg.Add(1)
          		go func(n int) {
          			defer wg.Done()
          			status, elapsed, err := doRequest(endpoint, token)
          			if err != nil {
          				concFail.Add(1)
          				fmt.Printf("conc%02d: FAILED (%s) err=%s\n", n, elapsed, err)
          			} else {
          				fmt.Printf("conc%02d: status=%d time=%s\n", n, status, elapsed)
          			}
          		}(i)
          	}
          	wg.Wait()
          	fmt.Printf("Concurrent 20 result: %d/20 failed\n\n", concFail.Load())

          	fmt.Println("=== Concurrent: 50 requests, each with NEW connection ===")
          	var concFail50 atomic.Int32
          	var wg50 sync.WaitGroup
          	for i := 1; i <= 50; i++ {
          		wg50.Add(1)
          		go func(n int) {
          			defer wg50.Done()
          			status, elapsed, err := doRequest(endpoint, token)
          			if err != nil {
          				concFail50.Add(1)
          				fmt.Printf("conc50_%02d: FAILED (%s) err=%s\n", n, elapsed, err)
          			} else {
          				fmt.Printf("conc50_%02d: status=%d time=%s\n", n, status, elapsed)
          			}
          		}(i)
          	}
          	wg50.Wait()
          	fmt.Printf("Concurrent 50 result: %d/50 failed\n", concFail50.Load())
          }
          GOEOF
          go run /tmp/netdiag.go
        env:
          ECI_API_ACCESS_TOKEN: ${{ secrets.ECI_API_ACCESS_TOKEN }}
          ECI_API_ENDPOINT: "https://portal.elice.cloud/api/"
      - name: Run acceptance tests
        run: make testacc
        env:
          TF_ACC: "1"
          # Sensitive — stored in GitHub Secrets
          ECI_API_ACCESS_TOKEN: ${{ secrets.ECI_API_ACCESS_TOKEN }}
          # Non-sensitive — infrastructure config
          ECI_API_ENDPOINT: "https://portal.elice.cloud/api/"
          ECI_ZONE_ID: "cb67250d-0050-44fa-9872-c8dd7fb9e614"
          ECI_TEST_REGION_NAME: "central-01"
          ECI_TEST_ZONE_NAME: "central-01-a"
          ECI_TEST_INSTANCE_TYPE_NAME: "C-2"
          ECI_TEST_IMAGE_NAME: "Ubuntu 22.04 LTS (20250116)"
          ECI_TEST_PRICING_NAME: "C-2"
          ECI_TEST_PRICING_TYPE: "ondemand"
          ECI_TEST_VM_PRICING_NAME: "C-2"
          ECI_TEST_VM_PRICING_TYPE: "ondemand"
          ECI_TEST_BS_PRICING_NAME: "Block Storage"
          ECI_TEST_BS_PRICING_TYPE: "ondemand"
          ECI_TEST_PIP_PRICING_NAME: "Public IP"
          ECI_TEST_PIP_PRICING_TYPE: "ondemand"
