name: Acceptance Test

on:
  pull_request:
    types: [labeled, synchronize]

permissions:
  contents: read

jobs:
  acceptance_test:
    if: contains(github.event.pull_request.labels.*.name, 'run-acceptance-tests')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Network diagnostics
        run: |
          echo "=== curl sequential 50x (new connection each, no keep-alive) ==="
          for i in $(seq 1 50); do
            curl -sS -o /dev/null --no-keepalive --max-time 30 \
              -w "curl_seq%02d: http_code=%{http_code} time=%{time_total}s tcp=%{time_connect}s tls=%{time_appconnect}s\n" \
              https://portal.elice.cloud/api/ 2>&1 | sed "s/%02d/$(printf '%02d' $i)/" || echo "curl_seq$(printf '%02d' $i): FAILED"
          done

          echo ""
          echo "=== curl concurrent 50x ==="
          for i in $(seq 1 50); do
            (curl -sS -o /dev/null --no-keepalive --max-time 30 \
              -w "curl_conc$(printf '%02d' $i): http_code=%{http_code} time=%{time_total}s tcp=%{time_connect}s tls=%{time_appconnect}s\n" \
              https://portal.elice.cloud/api/ || echo "curl_conc$(printf '%02d' $i): FAILED") &
          done
          wait

          echo ""
          echo "=== Go diagnostics ==="
          cat > /tmp/netdiag.go << 'GOEOF'
          package main

          import (
          	"context"
          	"crypto/tls"
          	"fmt"
          	"net"
          	"os"
          	"time"
          )

          func main() {
          	host := "portal.elice.cloud"

          	fmt.Println("=== Go DNS resolver ===")
          	resolver := net.DefaultResolver
          	ctx := context.Background()
          	addrs, err := resolver.LookupHost(ctx, host)
          	if err != nil {
          		fmt.Printf("DNS FAILED: %s\n", err)
          	} else {
          		fmt.Printf("DNS resolved: %v\n", addrs)
          	}

          	fmt.Println("\n=== Go TLS details ===")
          	dialer := &net.Dialer{Timeout: 10 * time.Second}
          	conn, err := tls.DialWithDialer(dialer, "tcp", host+":443", &tls.Config{})
          	if err != nil {
          		fmt.Printf("TLS dial FAILED: %s\n", err)
          		os.Exit(1)
          	}
          	state := conn.ConnectionState()
          	fmt.Printf("TLS version: %d (0x0304=TLS1.3, 0x0303=TLS1.2)\n", state.Version)
          	fmt.Printf("Cipher suite: %d\n", state.CipherSuite)
          	fmt.Printf("Server name: %s\n", state.ServerName)
          	fmt.Printf("Negotiated protocol: %s\n", state.NegotiatedProtocol)
          	conn.Close()

          	fmt.Println("\n=== Go net.Dialer resolver comparison ===")
          	fmt.Println("--- Using Go resolver ---")
          	resolver.PreferGo = true
          	addrsGo, _ := resolver.LookupHost(ctx, host)
          	fmt.Printf("Go resolver: %v\n", addrsGo)

          	fmt.Println("--- Using CGO/system resolver ---")
          	resolver.PreferGo = false
          	addrsCgo, _ := resolver.LookupHost(ctx, host)
          	fmt.Printf("CGO resolver: %v\n", addrsCgo)
          }
          GOEOF
          go run /tmp/netdiag.go
      - name: Run acceptance tests
      - name: Run acceptance tests
        run: make testacc
        env:
          TF_ACC: "1"
          # Sensitive — stored in GitHub Secrets
          ECI_API_ACCESS_TOKEN: ${{ secrets.ECI_API_ACCESS_TOKEN }}
          # Non-sensitive — infrastructure config
          ECI_API_ENDPOINT: "https://portal.elice.cloud/api/"
          ECI_ZONE_ID: "cb67250d-0050-44fa-9872-c8dd7fb9e614"
          ECI_TEST_REGION_NAME: "central-01"
          ECI_TEST_ZONE_NAME: "central-01-a"
          ECI_TEST_INSTANCE_TYPE_NAME: "C-2"
          ECI_TEST_IMAGE_NAME: "Ubuntu 22.04 LTS (20250116)"
          ECI_TEST_PRICING_NAME: "C-2"
          ECI_TEST_PRICING_TYPE: "ondemand"
          ECI_TEST_VM_PRICING_NAME: "C-2"
          ECI_TEST_VM_PRICING_TYPE: "ondemand"
          ECI_TEST_BS_PRICING_NAME: "Block Storage"
          ECI_TEST_BS_PRICING_TYPE: "ondemand"
          ECI_TEST_PIP_PRICING_NAME: "Public IP"
          ECI_TEST_PIP_PRICING_TYPE: "ondemand"
