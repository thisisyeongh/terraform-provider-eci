name: Acceptance Test

on:
  pull_request:
    types: [labeled, synchronize]

permissions:
  contents: read

jobs:
  acceptance_test:
    if: contains(github.event.pull_request.labels.*.name, 'run-acceptance-tests')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: curl 200x sequential (new connection, 120s timeout)
        run: |
          echo "=== curl 200x sequential (--no-keepalive, --max-time 120) ==="
          failed=0
          for i in $(seq 1 200); do
            result=$(curl -sS -o /dev/null --no-keepalive --max-time 120 \
              -w "%{http_code} %{time_total} %{time_connect} %{time_appconnect}" \
              https://portal.elice.cloud/api/user/organization 2>&1) || true
            code=$(echo "$result" | awk '{print $1}')
            total=$(echo "$result" | awk '{print $2}')
            if [ "$code" = "000" ] || [ -z "$code" ]; then
              failed=$((failed + 1))
              printf "  %03d: FAILED %s\n" "$i" "$result"
            else
              printf "  %03d: http=%s time=%ss\n" "$i" "$code" "$total"
            fi
          done
          echo ""
          echo "Result: $failed/200 failed"
          if [ "$failed" -gt 0 ]; then
            exit 1
          fi
